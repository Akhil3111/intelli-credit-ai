<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Error | Intelli-Credit AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
body{font-family:'Inter',sans-serif;background:#F8FAFC;color:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:.4rem;}
.code{font-size:4.5rem;font-weight:800;color:#1E40AF;line-height:1;}
.msg{font-size:.95rem;color:#64748B;margin:.4rem 0 1.8rem;}
a{color:#1E40AF;font-weight:600;text-decoration:none;font-size:.88rem;}a:hover{text-decoration:underline;}
</style>
</head>
<body>
<i class="bi bi-exclamation-triangle" style="font-size:2.5rem;color:#D97706;margin-bottom:.5rem"></i>
<div class="code">{{ code }}</div>
<div class="msg">{{ message }}</div>
<a href="/"><i class="bi bi-house me-1"></i>Back to Home</a>
</body>
</html>
